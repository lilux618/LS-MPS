# LS-MPS Small Verification Configuration
# Hydrostatic pressure test: fluid column under gravity
# Particle count: ~63 fluid + 18 wall = 81 total

name: "hydrostatic_verification"

# Particle parameters
particle:
  l0: 0.02           # Initial particle spacing [m]
  re: 0.042          # Cutoff radius = 2.1 * l0 [m]

# Fluid properties
fluid:
  rho: 1000.0        # Density [kg/m^3]
  nu: 1.0e-6         # Kinematic viscosity [m^2/s]

# Physical parameters
physical:
  gx: 0.0
  gy: 0.0
  gz: -9.8           # Gravity [m/s^2]

# MPS parameters
mps:
  alpha: 0.02        # Velocity divergence source term coefficient
  beta: 0.97         # Surface detection threshold
  lambda_shift: 0.1  # Particle shifting coefficient

# Time stepping
time:
  dt: 0.0001         # Time step [s]
  steps: 1           # Number of steps

# Domain and particle layout
domain:
  nx: 3              # Particles in x-direction
  ny: 3              # Particles in y-direction
  nz: 7              # Fluid particles in z-direction (5 fluid + 2 wall layers)
  # Domain size computed as: [0, nx*l0] x [0, ny*l0] x [0, (nz+2)*l0]
  # Bottom wall at z=0, top wall at z=(nz+1)*l0, fluid in between

# Output
output:
  verbose: true
  check_ref: true
