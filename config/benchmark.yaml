# LS-MPS Benchmark Configuration
# Larger particle count for performance measurement

name: "benchmark"

# Particle parameters
particle:
  l0: 0.01           # Initial particle spacing [m]
  re: 0.021          # Cutoff radius = 2.1 * l0 [m]

# Fluid properties
fluid:
  rho: 1000.0        # Density [kg/m^3]
  nu: 1.0e-6         # Kinematic viscosity [m^2/s]

# Physical parameters
physical:
  gx: 0.0
  gy: 0.0
  gz: -9.8           # Gravity [m/s^2]

# MPS parameters
mps:
  alpha: 0.02
  beta: 0.97
  lambda_shift: 0.1

# Time stepping
time:
  dt: 0.0001
  steps: 100         # More steps for benchmarking

# Domain and particle layout
domain:
  nx: 10             # Particles in x-direction
  ny: 10             # Particles in y-direction
  nz: 20             # Particles in z-direction (18 fluid + 2 wall layers)
  # Total: ~2000 particles

# Output
output:
  verbose: false
  check_ref: false
